name: lolipants
description: Lolipants — premium Middle Eastern fashion design app.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  dio: ^5.4.3
  flutter_animate: ^4.5.0
  flutter_dotenv: ^5.1.0
  flutter_riverpod: ^2.5.1
  flutter_secure_storage: ^9.2.2
  fpdart: ^1.1.0
  go_router: ^14.0.0
  google_fonts: ^6.2.1
  google_mlkit_commons: ^0.11.1
  google_mlkit_pose_detection: ^0.14.1
  intl: ^0.20.2
  logging: ^1.2.0
  rive: ^0.13.2
  riverpod_annotation: ^2.3.5
  shared_preferences: ^2.3.2
  camera: ^0.12.0+1
  permission_handler: ^12.0.1
  image_picker: ^1.2.0
  flutter_colorpicker: ^1.1.0
  just_audio: ^0.9.40
  audio_session: ^0.1.21
  package_info_plus: ^8.0.2
  webview_flutter: ^4.8.0
  url_launcher: ^6.3.1
  onesignal_flutter: ^5.2.6
  cached_network_image: ^3.4.1
  file_picker: ^8.1.4
  path: ^1.9.0
  google_sign_in: ^7.2.0
  geolocator: ^13.0.2

dev_dependencies:
  build_runner: ^2.4.11
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter
  riverpod_generator: ^2.4.3
  very_good_analysis: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/animations/lolipants_splash.gif
    - assets/images/
    - assets/images/mannequins/
    - assets/images/designs/
    - assets/images/configurator/
    - assets/google/
    - .env

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
    - family: NotoNaskhArabic
      fonts:
        - asset: assets/fonts/NotoNaskhArabic-Variable.ttf
