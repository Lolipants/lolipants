name: lolipants
description: Lolipants — premium Middle Eastern fashion design app.
publish_to: 'none'

version: 1.0.7+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  dio: ^5.4.3
  flutter_animate: ^4.5.0
  flutter_dotenv: ^5.1.0
  flutter_riverpod: ^2.5.1
  flutter_secure_storage: ^9.2.2
  fpdart: ^1.1.0
  go_router: ^14.0.0
  google_fonts: ^6.2.1
  google_mlkit_commons: ^0.11.1
  google_mlkit_pose_detection: ^0.14.1
  intl: ^0.20.2
  logging: ^1.2.0
  rive: ^0.13.2
  riverpod_annotation: ^2.3.5
  shared_preferences: ^2.3.2
  camera: ^0.12.0+1
  permission_handler: ^12.0.1
  image_picker: ^1.2.0
  flutter_colorpicker: ^1.1.0
  just_audio: ^0.9.40
  audio_session: ^0.1.21
  package_info_plus: ^8.0.2
  webview_flutter: ^4.8.0
  url_launcher: ^6.3.1
  onesignal_flutter: ^5.2.6
  cached_network_image: ^3.4.1
  file_picker: ^8.1.4
  path: ^1.9.0
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^7.0.1
  geolocator: ^13.0.2

dev_dependencies:
  build_runner: ^2.4.11
  flutter_launcher_icons: ^0.14.3
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter
  riverpod_generator: ^2.4.3
  very_good_analysis: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/lolipants.jpg
  adaptive_icon_background: "#F4C400"
  adaptive_icon_foreground: assets/lolipants.jpg
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/animations/lolipants_splash.gif
    - assets/images/
    # designs / mannequins / configurator: hosted on R2 (see upload-catalog-assets).
    # Pass --dart-define=FEATURE_BUNDLED_CATALOG_ASSETS=true to bundle locally.
    - assets/google/
    - .env

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
    - family: NotoNaskhArabic
      fonts:
        - asset: assets/fonts/NotoNaskhArabic-Variable.ttf
    - family: Ashborn
      fonts:
        - asset: assets/fonts/Ashborn.otf
    - family: Blaugrana
      fonts:
        - asset: assets/fonts/Blaugrana Personal Use.ttf
    - family: ComicRoasting
      fonts:
        - asset: assets/fonts/Comic Roasting.otf
    - family: Curseyt
      fonts:
        - asset: assets/fonts/Curseyt.ttf
    - family: Dracutaz
      fonts:
        - asset: assets/fonts/Dracutaz.ttf
    - family: Gorecobra
      fonts:
        - asset: assets/fonts/Gorecobra.ttf
    - family: Hellshunx
      fonts:
        - asset: assets/fonts/Hellshunx.ttf
    - family: HigherJump
      fonts:
        - asset: assets/fonts/Higher Jump.ttf
    - family: HoneyBear
      fonts:
        - asset: assets/fonts/Honey Bear.ttf
    - family: Kabisat
      fonts:
        - asset: assets/fonts/Kabisat Demo-ItalicTall.ttf
    - family: KatalesBroken
      fonts:
        - asset: assets/fonts/Katales Broken copy.otf
    - family: Meltdown
      fonts:
        - asset: assets/fonts/Meltdown.ttf
    - family: MerryBright
      fonts:
        - asset: assets/fonts/Merry Bright.otf
    - family: Midorima
      fonts:
        - asset: assets/fonts/Midorima-PersonalUse-Regular.ttf
    - family: NoctraDripOutline
      fonts:
        - asset: assets/fonts/NoctraDrip-Outline.ttf
    - family: NoctraDripOutlineMelt
      fonts:
        - asset: assets/fonts/NoctraDrip-OutlineMelt.ttf
    - family: NoctraDripSolid
      fonts:
        - asset: assets/fonts/NoctraDrip-Solid.ttf
    - family: NoctraDripSolidMelt
      fonts:
        - asset: assets/fonts/NoctraDrip-SolidMelt.ttf
    - family: QomariahArabic
      fonts:
        - asset: assets/fonts/Qomariah Arabic.ttf
    - family: Redeyes
      fonts:
        - asset: assets/fonts/Redeyes demo1.otf
    - family: Rockybilly
      fonts:
        - asset: assets/fonts/Rockybilly.ttf
    - family: RollingBeat
      fonts:
        - asset: assets/fonts/Rolling Beat_Personal Use.ttf
    - family: Rooster
      fonts:
