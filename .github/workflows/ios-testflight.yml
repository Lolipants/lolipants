name: iOS TestFlight

on:
  workflow_dispatch:
    inputs:
      build_name:
        description: "Marketing version (defaults to pubspec or tag)"
        required: false
        type: string
      build_number:
        description: "Build number (defaults to workflow run number)"
        required: false
        type: string
      upload_testflight:
        description: "Upload IPA to TestFlight after build"
        required: true
        default: true
        type: boolean
  push:
    tags:
      - "v*"

concurrency:
  group: ios-testflight-${{ github.ref }}
  cancel-in-progress: false

env:
  IOS_BUNDLE_ID: com.lolipants.lolipants

jobs:
  build-and-upload:
    runs-on: macos-14
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.41.6"
          cache: true

      - name: Resolve build version
        env:
          INPUT_BUILD_NAME: ${{ inputs.build_name }}
          INPUT_BUILD_NUMBER: ${{ inputs.build_number }}
        run: bash scripts/ci/resolve_ios_build_version.sh

      - name: Write release .env
        env:
          BETTER_AUTH_BASE_URL: ${{ secrets.BETTER_AUTH_BASE_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          GOOGLE_SERVER_CLIENT_ID: ${{ secrets.GOOGLE_SERVER_CLIENT_ID }}
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          TAP_PUBLIC_KEY: ${{ secrets.TAP_PUBLIC_KEY }}
          BETTER_AUTH_ORIGIN: ${{ secrets.BETTER_AUTH_ORIGIN }}
          CLOUDFLARE_API_BASE: ${{ secrets.CLOUDFLARE_API_BASE }}
          CLOUDFLARE_R2_BASE_URL: ${{ secrets.CLOUDFLARE_R2_BASE_URL }}
        run: bash scripts/ci/write_release_env.sh

      - name: Install Apple signing assets
        env:
          IOS_DIST_CERT_P12_BASE64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          IOS_DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: bash scripts/ci/install_ios_signing.sh

      - name: Generate ExportOptions.plist
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          IOS_PROVISIONING_PROFILE_NAME: ${{ env.IOS_PROVISIONING_PROFILE_NAME }}
        run: bash scripts/ci/generate_export_options_plist.sh

      - name: Configure Xcode manual signing
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          IOS_PROVISIONING_PROFILE_NAME: ${{ env.IOS_PROVISIONING_PROFILE_NAME }}
        run: bash scripts/ci/write_ios_signing_xcconfig.sh

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Patch camera_avfoundation for Xcode 16
        run: bash scripts/ci/patch_camera_avfoundation_ios18.sh

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Build IPA
        run: |
          bash scripts/ci/patch_camera_avfoundation_ios18.sh
          bash scripts/ci/unlock_signing_keychain.sh
          flutter build ipa --release \
            --build-name="${BUILD_NAME}" \
            --build-number="${BUILD_NUMBER}" \
            --export-options-plist=ios/ExportOptions.plist \
            --dart-define=FEATURE_MOCK_PAYMENT=false \
            --dart-define=FEATURE_COMMUNITY=${{ vars.FEATURE_COMMUNITY || 'true' }} \
            --dart-define=FEATURE_MUSIC_PLAYER=${{ vars.FEATURE_MUSIC_PLAYER || 'true' }} \
            --dart-define=FEATURE_AI_EDITOR_TAB=${{ vars.FEATURE_AI_EDITOR_TAB || 'true' }} \
            --dart-define=FEATURE_MENS=${{ vars.FEATURE_MENS || 'true' }} \
            --dart-define=FEATURE_CASUAL=${{ vars.FEATURE_CASUAL || 'true' }}

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: lolipants-ios-${{ env.BUILD_NAME }}-${{ env.BUILD_NUMBER }}
          path: build/ios/ipa/*.ipa
          retention-days: 14

      - name: Upload to TestFlight
        if: >-
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
          || (github.event_name == 'workflow_dispatch' && inputs.upload_testflight)
        uses: Apple-Actions/upload-testflight-build@v3
        with:
          app-path: build/ios/ipa/*.ipa
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}
