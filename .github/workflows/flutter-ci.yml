name: Flutter CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: flutter-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.41.6"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze lib test

      - name: Test
        run: |
          mapfile -t test_files < <(find test -type f -name '*_test.dart' ! -path '*/shared/widgets/shared_widgets_golden_test.dart')
          flutter test "${test_files[@]}"
